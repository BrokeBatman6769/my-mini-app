<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Claim Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 min-h-screen flex flex-col justify-between pb-24 select-none">

    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-[#0e1424] border-b border-zinc-800/80">
        <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-8 h-8 rounded-lg bg-violet-600 text-white flex items-center justify-center font-bold text-sm tracking-wider">
                P
            </div>
            <div>
                <h1 id="user-display" class="font-bold text-xs text-zinc-100">Polham</h1>
            </div>
        </div>
        <span class="text-xs bg-[#16223f] border border-[#23355c] px-2 py-1 rounded text-slate-300 font-mono font-bold">GB EN</span>
    </header>

    <main class="flex-1 p-4 overflow-y-auto">

        <!-- TAB 1: REAL-TIME CLAIM DASHBOARD (Matches Screenshot) -->
        <div id="tab-logs" class="tab-content">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="bar-chart-3" class="w-5 h-5 text-zinc-400"></i>
                <h2 class="text-base font-bold text-zinc-200">Claim Dashboard</h2>
            </div>

            <!-- Time Filter Menu -->
            <div class="grid grid-cols-4 gap-1.5 mb-3 bg-[#121214] p-1 rounded-xl border border-zinc-800/60">
                <button onclick="changeTimeFilter('today', this)" class="time-filter-btn text-[11px] font-bold py-2 rounded-lg bg-[#00ffcc] text-[#09090b] transition-all">Today</button>
                <button onclick="changeTimeFilter('7days', this)" class="time-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all">7 Days</button>
                <button onclick="changeTimeFilter('30days', this)" class="time-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all">30 Days</button>
                <button onclick="changeTimeFilter('all', this)" class="time-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all">All</button>
            </div>

            <!-- Type Filter Menu -->
            <div class="grid grid-cols-3 gap-1.5 mb-4 bg-[#121214] p-1 rounded-xl border border-zinc-800/60">
                <button onclick="changeTypeFilter('all_types', this)" class="type-filter-btn text-[11px] font-bold py-2 rounded-lg bg-[#00ffcc] text-[#09090b] transition-all">All Types</button>
                <button onclick="changeTypeFilter('Reload', this)" class="type-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all flex items-center justify-center gap-1">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Reload
                </button>
                <button onclick="changeTypeFilter('Drop', this)" class="type-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all flex items-center justify-center gap-1">
                    <i data-lucide="gift" class="w-3.5 h-3.5"></i> Drops
                </button>
            </div>

            <!-- Dashboard Stats Widget -->
            <div class="bg-[#121214] border border-zinc-800/80 rounded-2xl overflow-hidden mb-4 relative">
                <!-- Glowing Green Strip -->
                <div class="h-1 bg-[#00ffcc] w-20 mx-auto rounded-full"></div>
                <div class="p-6 text-center">
                    <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-1">Total Earned</p>
                    <p id="stats-success-count" class="text-xs text-zinc-400"><span class="text-zinc-200 font-bold">0</span> successful claims</p>
                </div>
            </div>

            <!-- Filtered Claims Stream -->
            <div id="logs-container" class="space-y-2 max-h-[300px] overflow-y-auto no-scrollbar">
                <p class="text-xs text-zinc-500 text-center py-6">No claims in this period.</p>
            </div>
        </div>

        <!-- TAB 2: MULTI-CASINO ACCOUNTS MANAGER -->
        <div id="tab-accounts" class="tab-content hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-zinc-400 tracking-wider uppercase">My Accounts</h2>
                <button onclick="toggleAddAccountForm()" class="bg-violet-600 hover:bg-violet-500 text-white text-[10px] font-bold px-2.5 py-1.5 rounded-lg flex items-center gap-1 uppercase tracking-wider">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add
                </button>
            </div>

            <!-- Form Supporting 6 Casinos -->
            <div id="add-account-form" class="bg-[#121214] border border-zinc-800 p-4 rounded-xl mb-4 hidden">
                <h3 class="text-xs font-bold text-zinc-200 mb-3 uppercase tracking-wider">Link Credentials</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">Select Casino</label>
                        <select id="acc-platform" class="w-full bg-[#09090b] border border-zinc-800 text-zinc-300 p-2.5 rounded-lg text-xs outline-none">
                            <option value="Stake.com">Stake.com</option>
                            <option value="Shuffle.com">Shuffle.com</option>
                            <option value="Rollbit.com">Rollbit.com</option>
                            <option value="Roobet.com">Roobet.com</option>
                            <option value="BC.Game">BC.Game</option>
                            <option value="Duelbits.com">Duelbits.com</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">Account Label</label>
                        <input id="acc-username" type="text" placeholder="e.g. Neoroki" class="w-full bg-[#09090b] border border-zinc-800 text-white px-3 py-2.5 rounded-lg text-xs outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">Session Cookie / Token</label>
                        <input id="acc-token" type="password" placeholder="Enter authorization credential" class="w-full bg-[#09090b] border border-zinc-800 text-white px-3 py-2.5 rounded-lg text-xs outline-none">
                    </div>
                    <button onclick="submitNewAccount()" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 rounded-lg text-xs tracking-wider uppercase">Save Connection</button>
                </div>
            </div>

            <div id="accounts-container" class="space-y-2">
                <p class="text-xs text-zinc-500 text-center py-6">Connecting to database...</p>
            </div>
        </div>

        <!-- TAB 3: BUY TABS -->
        <div id="tab-subscribe" class="tab-content hidden">
            <h2 class="text-sm font-bold text-zinc-400 tracking-wider uppercase mb-2">Pricing</h2>
            <div class="space-y-3">
                <div onclick="requestCheckout('Basic', 35)" class="bg-[#121214] border border-zinc-800 p-4 rounded-xl flex justify-between items-center cursor-pointer">
                    <div>
                        <p class="text-xs font-bold text-zinc-200">Basic Plan</p>
                        <p class="text-[10px] text-zinc-500">30 days automation</p>
                    </div>
                    <span class="text-sm font-bold text-violet-400">$35.00</span>
                </div>
            </div>
        </div>

        <!-- TAB 4: PREFERENCES -->
        <div id="tab-settings" class="tab-content hidden">
            <h2 class="text-sm font-bold text-zinc-400 tracking-wider uppercase mb-2">Prefs</h2>
            <div class="bg-[#121214] p-4 rounded-xl text-xs space-y-3">
                <div class="flex justify-between"><span>User ID</span><span id="my-tg-id" class="font-mono">Pending</span></div>
                <div class="flex justify-between border-t border-zinc-800 pt-3"><span>License Expiry</span><span id="my-license-expiry" class="text-yellow-500">Pending</span></div>
            </div>
        </div>

    </main>

    <!-- Floating Pill Navigation -->
    <div class="fixed bottom-3 left-3 right-3 bg-[#121214]/95 backdrop-blur-md border border-zinc-800/80 rounded-2xl shadow-xl py-2 px-1">
        <nav class="flex items-center justify-around">
            <button class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-500" onclick="switchTab('accounts', this)">
                <i data-lucide="users" class="w-4 h-4"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Accounts</span>
            </button>
            <button id="sub-btn-nav" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-500" onclick="switchTab('subscribe', this)">
                <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Buy</span>
            </button>
            <button id="dashboard-btn-nav" class="nav-btn flex flex-col items-center gap-1 flex-1 text-[#00ffcc]" onclick="switchTab('logs', this)">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Logs</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-500" onclick="switchTab('settings', this)">
                <i data-lucide="sliders" class="w-4 h-4"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Prefs</span>
            </button>
        </nav>
    </div>

    <script>
        lucide.createIcons();
        const tg = window.Telegram?.WebApp;
        
        const API_SERVER = "https://affluent-diary-sulphuric.ngrok-free.dev"; // Your active ngrok
        let telegramUserId = 123456789;

        if (tg) {
            tg.expand();
            tg.ready();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                telegramUserId = user.id;
                document.getElementById('user-display').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
            }
        }
        document.getElementById('my-tg-id').innerText = telegramUserId;

        let globalClaimsLogs = []; // Stores loaded log references
        let activeTimeFilter = 'today';
        let activeTypeFilter = 'all_types';

        function toggleAddAccountForm() {
            document.getElementById('add-account-form').classList.toggle('hidden');
        }

        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_SERVER}/get_user_info`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ telegram_id: telegramUserId })
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('my-license-expiry').innerText = data.expiry_date;
                    
                    renderAccounts(data.accounts);
                    globalClaimsLogs = data.logs || [];
                    processAndFilterLogs();
                }
            } catch (err) {
                console.error("Backend offline: ", err);
            }
        }

        function renderAccounts(accounts) {
            const container = document.getElementById('accounts-container');
            container.innerHTML = "";

            if (!accounts || accounts.length === 0) {
                container.innerHTML = `<div class="bg-[#121214] border border-zinc-800/80 rounded-xl p-6 text-center"><p class="text-xs text-zinc-500">No automated credentials registered yet.</p></div>`;
                return;
            }

            accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = "bg-[#121214] border border-zinc-800/80 rounded-xl p-3.5 flex justify-between items-center";
                card.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[9px] uppercase tracking-wider font-bold text-[#00ffcc]">${acc.platform}</span>
                        <span class="text-xs font-bold text-zinc-200 mt-0.5">${acc.username}</span>
                    </div>
                    <button onclick="deleteAccount(${acc.id})" class="text-zinc-500 hover:text-red-500 p-1.5 rounded-lg hover:bg-red-950/20"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // Handles active dynamic client-side filtering (Matches Screenshot filters)
        function changeTimeFilter(timeId, element) {
            document.querySelectorAll('.time-filter-btn').forEach(btn => {
                btn.className = "time-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all";
            });
            element.className = "time-filter-btn text-[11px] font-bold py-2 rounded-lg bg-[#00ffcc] text-[#09090b] transition-all";
            activeTimeFilter = timeId;
            processAndFilterLogs();
        }

        function changeTypeFilter(typeId, element) {
            document.querySelectorAll('.type-filter-btn').forEach(btn => {
                btn.className = "type-filter-btn text-[11px] font-bold py-2 rounded-lg text-zinc-400 hover:text-white transition-all flex items-center justify-center gap-1";
            });
            element.className = "type-filter-btn text-[11px] font-bold py-2 rounded-lg bg-[#00ffcc] text-[#09090b] transition-all flex items-center justify-center gap-1";
            activeTypeFilter = typeId;
            processAndFilterLogs();
        }

        function processAndFilterLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = "";

            const now = new Date();
            
            // Filter by date
            let filtered = globalClaimsLogs.filter(log => {
                const logDate = new Date(log.timestamp.replace(" ", "T"));
                const diffTime = Math.abs(now - logDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (activeTimeFilter === 'today') {
                    return logDate.toDateString() === now.toDateString();
                } else if (activeTimeFilter === '7days') {
                    return diffDays <= 7;
                } else if (activeTimeFilter === '30days') {
                    return diffDays <= 30;
                }
                return true; // "all"
            });

            // Filter by type
            if (activeTypeFilter !== 'all_types') {
                filtered = filtered.filter(log => log.claim_type === activeTypeFilter);
            }

            // Calculate Successful claims count
            const successCount = filtered.filter(log => log.status === "Success").length;
            document.getElementById('stats-success-count').innerHTML = `<span class="text-zinc-200 font-bold">${successCount}</span> successful claims`;

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-xs text-zinc-500 text-center py-6">No claims in this period.</p>`;
                return;
            }

            // Render matching logs
            filtered.forEach(log => {
                const row = document.createElement('div');
                row.className = "bg-[#121214] border border-zinc-800/80 p-3 rounded-xl flex justify-between items-center";
                row.innerHTML = `
                    <div>
                        <span class="text-[9px] uppercase tracking-wider font-bold text-zinc-500">${log.platform} • ${log.claim_type}</span>
                        <p class="text-xs font-bold text-zinc-300 mt-0.5">Code: ${log.code}</p>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-wider ${log.status === 'Success' ? 'text-emerald-400' : 'text-rose-500'}">${log.status}</span>
                `;
                container.appendChild(row);
            });
        }

        async function submitNewAccount() {
            const platform = document.getElementById('acc-platform').value;
            const username = document.getElementById('acc-username').value;
            const token = document.getElementById('acc-token').value;

            if (!username || !token) return;

            try {
                const response = await fetch(`${API_SERVER}/accounts/add`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ telegram_id: telegramUserId, platform, username, auth_token: token })
                });
                if (response.ok) {
                    document.getElementById('acc-username').value = "";
                    document.getElementById('acc-token').value = "";
                    toggleAddAccountForm();
                    loadUserInfo();
                }
            } catch (err) { console.error(err); }
        }

        async function deleteAccount(accountId) {
            try {
                const response = await fetch(`${API_SERVER}/accounts/delete`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ account_id: accountId, telegram_id: telegramUserId })
                });
                if (response.ok) loadUserInfo();
            } catch (err) { console.error(err); }
        }

        async function requestCheckout(planName, amount) {
            try {
                const response = await fetch(`${API_SERVER}/payments/create-invoice`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ telegram_id: telegramUserId, amount: amount, plan_name: planName })
                });
                if (response.ok) {
                    const data = await response.json();
                    if (tg) tg.openLink(data.checkout_url);
                    else window.open(data.checkout_url, '_blank');
                }
            } catch (err) { console.error(err); }
        }

        function switchTab(tabId, buttonElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn flex flex-col items-center gap-1 flex-1 text-slate-500";
            });
            buttonElement.className = `nav-btn flex flex-col items-center gap-1 flex-1 ${tabId === 'logs' ? 'text-[#00ffcc]' : 'text-violet-400'}`;
            
            if (tabId === 'logs' || tabId === 'accounts') loadUserInfo();
        }

        loadUserInfo();
    </script>
</body>
</html>
